name: pester

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Pester (Windows, no elevation)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # The Sensitivity-Gate tests shell out to `python guest/screener.py`, so the
      # runner needs Python on PATH. (Phase 0 introduced the first Python to the repo.)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pester 5
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser

      - name: Run the suite (mockable backend — no Hyper-V / no admin needed)
        shell: pwsh
        run: |
          $c = New-PesterConfiguration
          $c.Run.Path = 'tests'
          $c.Run.PassThru = $true
          $c.Output.Verbosity = 'Detailed'
          $c.Run.Exit = $true          # non-zero exit on any failure -> fails the job
          Invoke-Pester -Configuration $c
